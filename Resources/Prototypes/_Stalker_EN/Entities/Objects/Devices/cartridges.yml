- type: entity
  parent: BaseItem
  id: STFactionRelationsCartridge
  name: faction relations cartridge
  description: A program showing relations between Zone factions.
  components:
  - type: Sprite
    sprite: Objects/Devices/cartridge.rsi
    state: cart-y
  - type: UIFragment
    ui: !type:FactionRelationsUi
  - type: Cartridge
    programName: st-faction-relations-program-name
    icon:
      sprite: _Stalker_EN/Interface/Cartridges/faction_relations.rsi
      state: icon
  - type: STFactionRelationsCartridge

- type: entity
  parent: BasePDACartridge
  id: STLeaderboardCartridge
  name: st-leaderboard-cartridge
  description: "A program that shows a leaderboard of stalkers with their faction and rank."
  components:
  - type: Sprite
    sprite: Objects/Devices/cartridge.rsi
    state: cart
  - type: UIFragment
    ui: !type:STLeaderboardUi
  - type: Cartridge
    programName: st-leaderboard-program-name
    icon:
      sprite: _Stalker_EN/Interface/Cartridges/leaderboard.rsi
      state: icon
  - type: STLeaderboardCartridge

